components:
  schemas:
    AudienceEnum:
      enum:
      - merchant
      - rider
      type: string
      description: |-
        * `merchant` - Merchant
        * `rider` - Rider
    BroadcastCreate:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        vertical:
          type: integer
          nullable: true
          description: Scope to entire vertical
        zone:
          type: integer
          nullable: true
          description: Scope to single zone
        audience:
          $ref: '#/components/schemas/AudienceEnum'
        recipient_filter:
          type: string
          description: all | active | watch | inactive | critical | atrisk | flagged
          maxLength: 30
        channels:
          type: array
          items:
            $ref: '#/components/schemas/ChannelsEnum'
          description: 'Merchant: sms/whatsapp/email. Rider: inapp'
        priority:
          $ref: '#/components/schemas/PriorityEnum'
        template:
          type: integer
          nullable: true
        subject:
          type: string
          maxLength: 200
        body:
          type: string
        scheduled_at:
          type: string
          format: date-time
          nullable: true
      required:
      - audience
      - body
      - id
    BroadcastDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        audience:
          $ref: '#/components/schemas/AudienceEnum'
        channels:
