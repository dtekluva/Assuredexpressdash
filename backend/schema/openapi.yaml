openapi: 3.0.3
info:
  title: Assured Express Logistics API
  version: 1.0.0
  description: Operations Command Center — Riders, Merchants, Zones, Communications
paths:
  /api/v1/auth/change-password/:
    post:
      operationId: v1_auth_change_password_create
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/fcm-token/:
    post:
      operationId: v1_auth_fcm_token_create
      description: Riders call this on app launch to register their push token.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTokenObtainPair'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: v1_auth_logout_create
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/profile/:
    get:
      operationId: v1_auth_profile_retrieve
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    put:
      operationId: v1_auth_profile_update
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfile'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    patch:
      operationId: v1_auth_profile_partial_update
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfile'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/v1/auth/token/refresh/:
    post:
      operationId: v1_auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/comms/broadcasts/:
    get:
      operationId: v1_comms_broadcasts_list
      description: Create and manage broadcast sends.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBroadcastListList'
          description: ''
    post:
      operationId: v1_comms_broadcasts_create
      description: Create and manage broadcast sends.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BroadcastCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BroadcastCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BroadcastCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BroadcastCreate'
          description: ''
  /api/v1/comms/broadcasts/{id}/:
    get:
      operationId: v1_comms_broadcasts_retrieve
      description: Create and manage broadcast sends.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BroadcastDetail'
          description: ''
    put:
      operationId: v1_comms_broadcasts_update
      description: Create and manage broadcast sends.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BroadcastCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BroadcastCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BroadcastCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BroadcastCreate'
          description: ''
    patch:
      operationId: v1_comms_broadcasts_partial_update
      description: Create and manage broadcast sends.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedBroadcastCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedBroadcastCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedBroadcastCreate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BroadcastCreate'
          description: ''
    delete:
      operationId: v1_comms_broadcasts_destroy
      description: Create and manage broadcast sends.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/comms/broadcasts/{id}/deliveries/:
    get:
      operationId: v1_comms_broadcasts_deliveries_retrieve
      description: Create and manage broadcast sends.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BroadcastList'
          description: ''
  /api/v1/comms/broadcasts/{id}/send/:
    post:
      operationId: v1_comms_broadcasts_send_create
      description: Trigger async delivery of a draft or scheduled broadcast.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BroadcastList'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BroadcastList'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BroadcastList'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BroadcastList'
          description: ''
  /api/v1/comms/notifications/:
    get:
      operationId: v1_comms_notifications_list
      description: |-
        GET /api/v1/comms/notifications/
        Returns the calling rider's in-app notifications.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRiderNotificationList'
          description: ''
  /api/v1/comms/notifications/{id}/read/:
    post:
      operationId: v1_comms_notifications_read_create
      description: POST /api/v1/comms/notifications/{id}/read/
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/comms/templates/:
    get:
      operationId: v1_comms_templates_list
      description: CRUD for reusable message templates.
      parameters:
      - in: query
        name: audience
        schema:
          type: string
          enum:
          - merchant
          - rider
        description: |-
          * `merchant` - Merchant
          * `rider` - Rider
      - in: query
        name: msg_type
        schema:
          type: string
          enum:
          - drip
          - general
          - incentive
          - operational
          - performance
          - promotion
          - reminder
          - seasonal
        description: |-
          * `promotion` - Promotion
          * `reminder` - Reminder
          * `drip` - Drip
          * `seasonal` - Seasonal
          * `performance` - Performance
          * `incentive` - Incentive
          * `operational` - Operational
          * `general` - General
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMessageTemplateList'
          description: ''
    post:
      operationId: v1_comms_templates_create
      description: CRUD for reusable message templates.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageTemplate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MessageTemplate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MessageTemplate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageTemplate'
          description: ''
  /api/v1/comms/templates/{id}/:
    get:
      operationId: v1_comms_templates_retrieve
      description: CRUD for reusable message templates.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this message template.
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageTemplate'
          description: ''
    put:
      operationId: v1_comms_templates_update
      description: CRUD for reusable message templates.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this message template.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageTemplate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MessageTemplate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MessageTemplate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageTemplate'
          description: ''
    patch:
      operationId: v1_comms_templates_partial_update
      description: CRUD for reusable message templates.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this message template.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMessageTemplate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMessageTemplate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMessageTemplate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageTemplate'
          description: ''
    delete:
      operationId: v1_comms_templates_destroy
      description: CRUD for reusable message templates.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this message template.
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/core/dashboard/:
    get:
      operationId: v1_core_dashboard_retrieve
      description: |-
        GET /api/v1/core/dashboard/?period=this_month
        Returns the top-level KPIs used on the main Operations Command Center page.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/core/leaderboard/:
    get:
      operationId: v1_core_leaderboard_retrieve
      description: Global zone and vertical leaderboards.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/core/merchants/:
    get:
      operationId: v1_core_merchants_list
      parameters:
      - in: query
        name: business_type
        schema:
          type: string
      - in: query
        name: inactive_days
        schema:
          type: number
        description: Days since last order (≥ N)
      - in: query
        name: onboarded_after
        schema:
          type: string
          format: date
      - in: query
        name: onboarded_before
        schema:
          type: string
          format: date
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
      - in: query
        name: vertical
        schema:
          type: integer
      - in: query
        name: zone
        schema:
          type: integer
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMerchantListList'
          description: ''
    post:
      operationId: v1_core_merchants_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MerchantDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MerchantDetail'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantDetail'
          description: ''
  /api/v1/core/merchants/{id}/:
    get:
      operationId: v1_core_merchants_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this merchant.
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantDetail'
          description: ''
    put:
      operationId: v1_core_merchants_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this merchant.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MerchantDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MerchantDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MerchantDetail'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantDetail'
          description: ''
    patch:
      operationId: v1_core_merchants_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this merchant.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMerchantDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMerchantDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMerchantDetail'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantDetail'
          description: ''
    delete:
      operationId: v1_core_merchants_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this merchant.
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/core/merchants/{id}/performance/:
    get:
      operationId: v1_core_merchants_performance_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this merchant.
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantDetail'
          description: ''
  /api/v1/core/orders/:
    get:
      operationId: v1_core_orders_list
      parameters:
      - in: query
        name: date_from
        schema:
          type: string
          format: date-time
      - in: query
        name: date_to
        schema:
          type: string
          format: date-time
      - in: query
        name: merchant
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: rider
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: array
          items:
            type: string
            enum:
            - assigned
            - cancelled
            - delivered
            - failed
            - pending
            - picked_up
            - returned
        description: |-
          * `pending` - Pending
          * `assigned` - Assigned to Rider
          * `picked_up` - Picked Up
          * `delivered` - Delivered
          * `failed` - Failed
          * `returned` - Returned
          * `cancelled` - Cancelled
        explode: true
        style: form
      - in: query
        name: vertical
        schema:
          type: integer
      - in: query
        name: zone
        schema:
          type: integer
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrderList'
          description: ''
    post:
      operationId: v1_core_orders_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrderCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrderCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreate'
          description: ''
  /api/v1/core/orders/{id}/:
    get:
      operationId: v1_core_orders_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this order.
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
          description: ''
    put:
      operationId: v1_core_orders_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this order.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStatusUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrderStatusUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrderStatusUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderStatusUpdate'
          description: ''
    patch:
      operationId: v1_core_orders_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this order.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedOrderStatusUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedOrderStatusUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedOrderStatusUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderStatusUpdate'
          description: ''
    delete:
