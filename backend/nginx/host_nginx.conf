# Use this configuration in /etc/nginx/sites-available/
# Don't forget to link it: ln -s /etc/nginx/sites-available/assured-express /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your_subdomain_or_ip_here; # TODO: Update this

    client_max_body_size 20M;

    # Static files - served from host path
    location /static/ {
        alias /home/Assuredexpressdash/backend/staticfiles/;
    }

    # Media files - served from host path
    location /media/ {
        alias /home/Assuredexpressdash/backend/media/;
    }

    # Backend API and Admin
    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
